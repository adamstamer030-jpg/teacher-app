name: teacher_app
description: منظم دروسك - إدارة مراكز المدرسين
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Database
  sqflite: ^2.3.0
  path: ^1.9.0

  # State Management
  flutter_bloc: ^8.1.5
  equatable: ^2.0.5

  # UI
  google_fonts: ^6.2.1
  flutter_slidable: ^3.1.0

  # Storage
  path_provider: ^2.1.3
  shared_preferences: ^2.2.3
  file_picker: ^8.0.3

  # PDF (temporarily disabled - causes Android resource build error,
  # not used in any screen yet, will re-add when PDF export is built)
  # pdf: ^3.11.3
  # printing: ^5.13.1

  # Utils
  intl: ^0.19.0
  url_launcher: ^6.3.0
  share_plus: ^9.0.0
  permission_handler: ^11.3.1
  uuid: ^4.4.0

  # QR
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#6366F1"
  adaptive_icon_foreground: "assets/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/icon.png
